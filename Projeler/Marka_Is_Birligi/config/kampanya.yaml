# ═══════════════════════════════════════════════════
# Marka İş Birliği — Kampanya Konfigürasyonu
# ═══════════════════════════════════════════════════
# Müşteri Kazanım Agenti formatında kampanya tanımı.
# Aşağıdaki değerleri kendi nişine / kampanyana göre doldur.

# --- 🏷️ KAMPANYA BİLGİLERİ ---
kampanya_adi: "marka-isbirligi"
aciklama: "Markalarla influencer iş birliği outreach kampanyası"
hedef_tip: "b2b_sirket"     # Markalar = B2B şirketler
durum: "draft"               # draft | active | paused | completed

# --- 🎯 HEDEF KİTLE (ICP) ---
icp:
  platform: ["web"]          # Marka web sitelerinden lead
  bolge: "<BOLGE>"
  dil: ["TR"]

  # Marka parametreleri — kendi nişinle değiştir
  sektor: ["<SEKTOR_1>", "<SEKTOR_2>"]
  sirket_buyuklugu: ""
  hedef_pozisyonlar: ["Pazarlama Müdürü", "İletişim Sorumlusu", "Marka Yöneticisi"]

# --- 🔍 ARAMA KRİTERLERİ ---
arama:
  anahtar_kelimeler:
    - "<ANAHTAR_KELIME_1>"
    - "<ANAHTAR_KELIME_2>"
  hashtag_listesi: []
  rakip_hesaplar: []
  max_lead_sayisi: 50

# --- 📧 OUTREACH AYARLARI ---
outreach:
  gonderen_email: "<EMAIL>"
  sablon_dili: "TR"
  sablon_dosyasi: "mail_templates/collaboration_tr.html"
  deger_onerisi: "<DEGER_ONERISI>"
  cta: "<CALL_TO_ACTION>"
  dry_run: true

# --- ⏱️ SEQUENCE AYARLARI ---
sequence:
  profil: "influencer"       # Marka iş birliği = influencer profili
  toplam_adim: 2             # İlk mail + 1 takip
  bekleme_suresi_acilmadi: 5
  bekleme_suresi_cevaplanmadi: 3
  gunluk_gonderim_limiti: 30
  gonderim_araligi: 10       # dakika (markalar için daha yavaş)
  gonderim_saatleri: "09:00-17:00"
  gonderim_gunleri: ["Pzt", "Sal", "Car", "Per", "Cum"]
  saat_dilimi: "UTC+3"

# --- 📁 DOSYA YOLLARI ---
dosyalar:
  proje_dizini: "Projeler/Marka_Bulma_Outreach/"
  ham_cikti: "Projeler/Marka_Bulma_Outreach/data/markalar_raw.json"
  zenginlestirilmis: "Projeler/Marka_Bulma_Outreach/data/markalar_enriched.json"
  mesajlar: "Projeler/Marka_Bulma_Outreach/data/markalar_messages.json"
  log: "Projeler/Marka_Bulma_Outreach/data/markalar_log.csv"
  mevcut_liste: "Projeler/Marka_Bulma_Outreach/data/markalar.csv"
  mail_template: "Projeler/Marka_Bulma_Outreach/mail_templates/collaboration_tr.html"
