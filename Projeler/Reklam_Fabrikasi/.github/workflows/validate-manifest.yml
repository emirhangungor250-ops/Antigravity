name: Validate plugin manifest

# Jenerik örnek workflow. Hicbir secret kullanmaz; sadece manifest dogrulayicisini
# calistirir. Kendi repona koydugunda oldugu gibi calisir.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-manifest:
    name: Validate plugin manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run manifest validator
        run: python3 scripts/validate-manifest.py
