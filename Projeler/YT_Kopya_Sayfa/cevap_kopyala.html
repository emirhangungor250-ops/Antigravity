<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Cevabı kopyala</title>
<!--
  YouTube Yorum Cevaplayıcı kopyala sayfası.
  Sunucusuz: tüm veri mail butonunun linkindeki #d= hash'inde gelir (base64 JSON).
  Hiçbir şey sunucuya yazılmaz/gönderilmez; sayfa sadece cevabı gösterip panoya kopyalar.
-->
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b1120; color: #e2e8f0; margin: 0; padding: 20px;
    line-height: 1.5; -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .card {
    background: #1e293b; border: 1px solid #334155; border-radius: 14px;
    padding: 20px; margin-top: 16px;
  }
  .kicker { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
  .lbl { font-size: 12px; color: #94a3b8; margin: 0 0 6px; }
  .comment {
    background: #0f172a; border: 1px solid #334155; border-radius: 10px;
    padding: 12px 14px; color: #cbd5e1; font-size: 14px; white-space: pre-wrap; word-break: break-word;
  }
  .reply {
    width: 100%; background: #0f172a; color: #f1f5f9;
    border: 1px solid #16a34a; border-radius: 10px; padding: 14px;
    font-size: 16px; font-family: inherit; line-height: 1.55; white-space: pre-wrap;
    word-break: break-word; resize: vertical; min-height: 90px;
  }
  .btn {
    display: block; width: 100%; text-align: center; text-decoration: none;
    border: none; cursor: pointer; border-radius: 12px;
    font-size: 17px; font-weight: 700; padding: 16px; margin-top: 14px;
    font-family: inherit;
  }
  .btn-main { background: #16a34a; color: #fff; }
  .btn-main:active { background: #15803d; }
  .btn-sec {
    background: transparent; color: #94a3b8; font-weight: 600; font-size: 14px;
    padding: 12px; margin-top: 8px;
  }
  .ok { display: none; margin-top: 12px; padding: 12px 14px; border-radius: 10px;
        background: #064e3b; color: #d1fae5; font-size: 14px; font-weight: 600; text-align: center; }
  .hint { font-size: 12px; color: #64748b; margin-top: 16px; text-align: center; }
  h1 { font-size: 20px; color: #f1f5f9; margin: 6px 0 0; }
  .err { color: #fca5a5; }
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">YouTube · cevabını kopyala</div>
  <h1 id="vtitle">Yorum cevabı</h1>

  <div class="card" id="card">
    <p class="lbl" id="who">İzleyici yazdı:</p>
    <div class="comment" id="comment">…</div>

    <p class="lbl" style="margin-top:16px;">Önerilen cevabın (düzenleyebilirsin):</p>
    <textarea class="reply" id="reply" rows="3">…</textarea>

    <button class="btn btn-main" id="copyBtn">📋 Kopyala ve YouTube'da aç</button>
    <a class="btn btn-sec" id="ytLink" href="#" target="_blank" rel="noopener">Sadece YouTube'da aç →</a>

    <div class="ok" id="ok"></div>
    <p class="hint">Kopyaladıktan sonra YouTube'da yorumun altına yapıştırıp gönder.</p>
  </div>
</div>

<script>
  function b64urlDecode(s){
    s = s.replace(/-/g,'+').replace(/_/g,'/');
    while (s.length % 4) s += '=';
    var bin = atob(s);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

  var data = null;
  try {
    var raw = location.hash.replace(/^#d=/, '').replace(/^#/, '');
    data = JSON.parse(b64urlDecode(raw));
  } catch (e) { data = null; }

  var replyEl = document.getElementById('reply');
  var ytEl = document.getElementById('ytLink');
  var okEl = document.getElementById('ok');

  if (!data || !data.r) {
    document.getElementById('card').innerHTML =
      '<p class="err">Bağlantı eksik ya da bozuk. Maildeki butona yeniden tıkla.</p>';
  } else {
    if (data.t) document.getElementById('vtitle').textContent = '📺 ' + data.t;
    document.getElementById('who').textContent = (data.a ? data.a : 'İzleyici') + ' yazdı:';
    document.getElementById('comment').textContent = data.c || '';
    replyEl.value = data.r;
    ytEl.href = data.y || '#';

    function goYoutube(){ if (data.y) window.location.href = data.y; }

    document.getElementById('copyBtn').onclick = async function(){
      var ok = false;
      try { await navigator.clipboard.writeText(replyEl.value); ok = true; }
      catch (e) {
        try { replyEl.focus(); replyEl.select(); ok = document.execCommand('copy'); } catch (_) {}
      }
      okEl.style.display = 'block';
      if (ok) {
        okEl.textContent = '✓ Cevap kopyalandı, YouTube açılıyor...';
        setTimeout(goYoutube, 750);
      } else {
        okEl.textContent = 'Otomatik kopyalanamadı. Yukarıdaki kutudaki yazıyı seçip elle kopyala.';
        replyEl.focus(); replyEl.select();
      }
    };
  }
</script>
</body>
</html>
