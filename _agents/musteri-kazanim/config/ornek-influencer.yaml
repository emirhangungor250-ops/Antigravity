# ═══════════════════════════════════════════════════
# 🎬 ÖRNEK — Etkinlik/Influencer Outreach Kampanyası
# ═══════════════════════════════════════════════════
# Referans: _agents/musteri-kazanim/AGENT.md
# Kullanım: Bu dosyayı kopyala → config/{kampanya-adi}.yaml
#           olarak kaydet → kendi kampanya bilgilerinle doldur.
# ═══════════════════════════════════════════════════

# --- 🏷️ KAMPANYA BİLGİLERİ ---
kampanya_adi: "ornek-etkinlik-influencer-2026"
aciklama: "Belirli bir alanda influencer'ları bulup iş birliği teklifi gönderme"
hedef_tip: "influencer"
durum: "draft"

# --- 🎯 HEDEF KİTLE (ICP) ---
icp:
  platform: ["instagram", "tiktok"]
  bolge: "Türkiye"
  dil: ["TR"]

  # Influencer profili
  minimum_takipci: 10000
  maksimum_takipci: 5000000
  nis: []                     # Örn: ["lifestyle", "müzik", "eğlence", "etkinlik"]
  icerik_dili: ["TR"]

# --- 🔍 ARAMA KRİTERLERİ ---
arama:
  anahtar_kelimeler:
    # Örnekler:
    # - "etkinlik istanbul"
    # - "konser istanbul"
    # - "festival türkiye"
    []

  hashtag_listesi:
    # Örnekler:
    # - "#istanbuletkinlik"
    # - "#festivalturkiye"
    []

  tiktok_anahtar_kelimeler:
    # Örnekler:
    # - "istanbul etkinlik"
    # - "türkiye festival"
    []

  rakip_hesaplar: []
  max_lead_sayisi: 100

# --- 📧 OUTREACH AYARLARI ---
outreach:
  gonderen_email: ""          # ← Gönderen Gmail adresi
  sablon_dili: "TR"
  sablon_dosyasi: "templates/email-tr.md"
  deger_onerisi: ""           # ← Kampanyaya özel değer önerisi
  cta: "Detayları konuşmak için kısa bir görüşme ayarlayabilir miyiz?"
  dry_run: true

  # Kişiselleştirme bilgileri
  gonderici_adi: ""           # ← Gönderici kişi adı
  ekstra_bilgi: ""            # ← Ek bilgi (etkinlik adı vb.)

# --- ⏱️ SEQUENCE AYARLARI ---
sequence:
  profil: "influencer"
  toplam_adim: 3
  bekleme_suresi_acilmadi: 5
  bekleme_suresi_cevaplanmadi: 3
  gunluk_gonderim_limiti: 50
  gonderim_araligi: 5
  gonderim_saatleri: "09:00-17:00"
  gonderim_gunleri: ["Pzt", "Sal", "Car", "Per", "Cum"]
  saat_dilimi: "UTC+3"

# --- 📁 DOSYA YOLLARI ---
dosyalar:
  ham_cikti: "data/ornek-etkinlik-influencer-2026_raw.json"
  zenginlestirilmis: "data/ornek-etkinlik-influencer-2026_enriched.json"
  mesajlar: "data/ornek-etkinlik-influencer-2026_messages.json"
  log: "data/ornek-etkinlik-influencer-2026_log.csv"
  takip: "data/ornek-etkinlik-influencer-2026_takip.csv"

# --- 🔑 API KAYNAKLARI ---
# API anahtarları bu dosyaya YAZILMAZ!
# Gerekli tokenlar:
#   APIFY_TOKEN       → _knowledge/api-anahtarlari.md veya env: APIFY_TOKEN
#   HUNTER_API_KEY    → _knowledge/api-anahtarlari.md veya env: HUNTER_API_KEY
#   APOLLO_API_KEY    → _knowledge/api-anahtarlari.md veya env: APOLLO_API_KEY
#   Gmail credentials → credentials.json + token.json (OAuth2)

# --- 📋 NOTLAR ---
# Tipik 4 adımlı pipeline:
#   1_influencer_bul.py → Lead bulma (Instagram + TikTok Apify scraping)
#   2_email_topla.py    → Email toplama (Bio → Instagram buton → Hunter → Apollo waterfall)
#   3_outreach_gonder.py → Gmail API ile outreach gönderim
#   4_takip_guncelle.py  → CSV bazlı takip ve yanıt yönetimi
